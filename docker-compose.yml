services:
  app:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      - BELEGE_DIR=/app/data/belege
    volumes:
      - belege:/app/data/belege
    expose:
      - "3000"

  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      - DOMAIN=${DOMAIN}
      - ACME_EMAIL=${ACME_EMAIL}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app

volumes:
  belege:
  caddy_data:
  caddy_config:
